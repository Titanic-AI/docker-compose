version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: Titanic_Databases
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - titanic-net

  web-backend:
    build: ./web-backend
    container_name: web-backend
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - Database_URL=postgresql://postgres:1234@db:5432/Titanic_Databases
    entrypoint: ["sh", "-c", "sleep 10 && uvicorn main:app --host 0.0.0.0 --port 8000"]
    networks:
      - titanic-net

  model-backend:
    build:
      context: ./model-backend
    networks:
      - titanic-net
    volumes:
      - model_data:/app/Models

  web-frontend:
    build:
      context: ./web-frontend/vite-project
      dockerfile: Dockerfile
    ports:
      - "8080"
    networks:
      - titanic-net
    depends_on:
      - web-backend

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "8081:80"
    # This replaces the need for a separate Caddyfile
    command: 
      - /bin/sh
      - -c
      - |
        cat <<EOF > /etc/caddy/Caddyfile
        :80
        handle /api/* {
            reverse_proxy web-backend:8000
        }
        handle /auth/* {
            reverse_proxy web-backend:8000
        }
        handle /predict/* {
            reverse_proxy model-backend:8000
        }
        handle {
            root * /srv/frontend
            file_server
            try_files {path} /index.html
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      # Only mount the dist folder, which Caddy needs to serve the site
      - ./web-frontend/vite-project/dist:/srv/frontend:ro
    depends_on:
      - web-frontend
      - web-backend
      - model-backend
    networks:
      - titanic-net

configs:
  my_caddyfile:
    file: ./Caddyfile  # Points to the Caddyfile in your repo root
  # cypress:
  #   image: cypress/included:12.17.4
  #   depends_on:
  #     - web-frontend
  #     - web-backend
  #     - model-backend
  #   working_dir: /e2e
  #   volumes:
  #     - ./web-frontend:/e2e
  #   command: ["npx", "cypress", "run"]

volumes:
  db_data:
  model_data:
  caddy_data:
  caddy_config:

networks:
  titanic-net:
    driver: bridge
