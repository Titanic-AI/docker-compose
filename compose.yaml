version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: Titanic_Databases
    volumes:
      - db_data:/var/lib/postgresql/data

  web-backend:
    build: ./web-backend
    container_name: web-backend
    expose:
      - "8000"
    depends_on:
      - db
    environment:
      - Database_URL=postgresql://postgres:1234@db:5432/Titanic_Databases
    entrypoint: ["sh", "-c", "sleep 10 && uvicorn main:app --host 0.0.0.0 --port 8000"]

  model-backend:
    build:
      context: ./model-backend
    expose:
      - "8000" # Explicitly exposing port 8000 so Caddy can find the target route
    volumes:
      - model_data:/app/Models

  web-frontend:
    build:
      context: ./web-frontend/vite-project
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - web-backend

  caddy:
    build:
      context: ./web-frontend/vite-project      
      dockerfile: Dockerfile
    image: titanic-frontend
    container_name: caddy
    expose:
      - "8081" # Expose the internal port directly to Coolify's outer proxy layer
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-frontend
      - web-backend
      - model-backend

volumes:
  db_data:
  model_data:
  caddy_data:
  caddy_config: