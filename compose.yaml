version: "3.9"

services:
  db:
    # image: postgres:16
    #container_name: db
    #restart: always
    #environment:
      #POSTGRES_USER: 
      #POSTGRES_PASSWORD:
      #POSTGRES_DB:
    #volumes:
    #  - db_data:/var/lib/postgresql/data
    networks:
      - titanic-net

  web-backend:
    build: ./web-backend
    container_name: web-backend
    depends_on:
      - db
      - model-backend
    networks:
      - titanic-net

  model-backend:
    build: ./model-backend
    container_name: model-backend
    networks:
      - titanic-net

  web-frontend:
    build: ./web-frontend
    container_name: web-frontend
    ports:
      - "8080:80" # frontend to localhost:8080
    depends_on:
      - web-backend
    networks:
      - titanic-net

volumes:
  db_data:

networks:
  titanic-net:
    driver: bridge
