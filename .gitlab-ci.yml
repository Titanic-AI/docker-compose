stages:
  - build
  - test
  - deploy

before_script:
  - git submodule sync
  - git submodule update --init --recursive --remote

build-frontend:
  stage: build
  image: node:20
  script:
    - cd web-frontend/vite-project
    - npm install
    - npm run build
  artifacts:
    paths:
      - web-frontend/vite-project/

build-backend:
  stage: build
  image: docker:20
  services:
    - docker:dind
  script:
    - docker build -t web-backend ./web-backend
    - docker build -t model-backend ./model-backend

unit-test-job:
  stage: test
  script:
    - echo "Running tests..."

deploy-job:      # This job runs in the deploy stage.
  stage: deploy  # It only runs when *both* jobs in the test stage complete successfully.
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
   # - docker compose -f docker-compose/compose.yaml up -d --build
