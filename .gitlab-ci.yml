version: "3.9"

services:
  db:
    # image: postgres:16
    # environment:
    #   POSTGRES_USER: ...
    #   POSTGRES_PASSWORD: ...
    #   POSTGRES_DB: ...
    # volumes:
    #   - db_data:/var/lib/postgresql/data
    networks:
      - titanic-net

  web-backend:
    build: ./web-backend
    container_name: web-backend
    depends_on:
      - db
      - model-backend
    networks:
      - titanic-net

  model-backend:
    build: ./model-backend
    container_name: model-backend
    networks:
      - titanic-net

  web-frontend:
    build: ./web-frontend
    container_name: web-frontend
    networks:
      - titanic-net

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "8080:80"  
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./web-frontend/dist:/srv/frontend 
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-frontend
      - web-backend
      - model-backend
    networks:
      - titanic-net

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  titanic-net:
    driver: bridge
