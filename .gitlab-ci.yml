stages:
  - build
  - test

# -----------------------------
# FRONTEND BUILD + TEST
# -----------------------------
build-frontend:
  stage: build
  image: node:20
  script:
    - cd web-frontend/vite-project
    - npm ci
    - npm run build
  artifacts:
    paths:
      - web-frontend/vite-project/dist

test-frontend:
  stage: test
  image: node:20
  script:
    - cd web-frontend/vite-project
    - npm ci
    - npm run lint         
    - npm run build        

# -----------------------------
# WEB-BACKEND DOCKER BUILD
# -----------------------------
build-web-backend:
  stage: build
  image: docker:20
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/web-backend:latest" ./web-backend
    - docker push "$CI_REGISTRY_IMAGE/web-backend:latest"

# -----------------------------
# WEB-BACKEND PYTEST
# -----------------------------
test-web-backend:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r web-backend/requirements.txt
    - pip install pytest
  script:
    - pytest web-backend
